; PlatformIO Project Configuration File
;
; ESP32 Sensor Node for LTESISTEM
; Connects to backend via WiFi + Socket.IO
;

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; Librerías
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
    links2004/WebSockets@^2.4.1

; Build flags
build_flags =
    -DBOARD_HAS_PSRAM=0
    -DARDUINO_SERIAL_PORT=0
